[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  full_bin = "APP_ENV=dev ./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "propatient-frontend"]
  delay = 1000
  stop_on_error = true
  log = "air.log"
  poll = true # Crucial para Windows